openapi: 3.0.3
info:
  title: Booking Service API
  description: |
    Saga orchestrator cho luồng đặt vé xem phim. Sử dụng Temporal workflow
    để chờ xác nhận thanh toán và thực hiện compensation (release seats)
    khi thanh toán thất bại hoặc quá hạn.
    Đây là Data Owner của entity Booking.
  version: 1.0.0

servers:
  - url: http://localhost:5005
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /bookings:
    post:
      summary: Khởi tạo booking; reserve seats + validate voucher + create payment; trả payment_url
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingCreateRequest"
      responses:
        "201":
          description: Khởi tạo thành công; workflow đã start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingCreateResponse"
        "400":
          description: Mã giảm giá không hợp lệ hoặc tham số sai
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Không tìm thấy showtime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Ghế đã được đặt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Dịch vụ phụ thuộc (voucher/payment) lỗi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{booking_id}:
    get:
      summary: Lấy chi tiết booking theo id
      operationId: getBookingById
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chi tiết booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Không tìm thấy booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/user/{user_id}:
    get:
      summary: Liệt kê booking của một user
      operationId: listBookingsByUser
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Danh sách booking (order by created_at desc)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /bookings/{booking_id}/cancel:
    post:
      summary: Hủy booking (user-initiated); trigger compensation release seats
      operationId: cancelBooking
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hủy thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Booking đang ở trạng thái ACTIVE/CANCELLED — không thể hủy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Không tìm thấy booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    BookingCreateRequest:
      type: object
      required:
        - user_id
        - showtime_id
        - seat_numbers
        - email
      properties:
        user_id:
          type: integer
          minimum: 1
        showtime_id:
          type: integer
          minimum: 1
        seat_numbers:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
        email:
          type: string
          format: email
        voucher_code:
          type: string
          nullable: true
          example: "WELCOME10"

    BookingCreateResponse:
      type: object
      required:
        - booking_id
        - payment_id
        - payment_url
        - status
        - final_amount
      properties:
        booking_id:
          type: integer
        workflow_id:
          type: string
          nullable: true
          description: Temporal workflow id
        payment_id:
          type: integer
        payment_url:
          type: string
          example: "http://localhost:5006/payments/12/checkout"
        status:
          type: string
          example: "AWAITING_PAYMENT"
        final_amount:
          type: string
          description: Decimal serialize thành chuỗi (Pydantic v2 default), ví dụ "180000.00"
          pattern: '^\d+(\.\d+)?$'

    Booking:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        showtime_id:
          type: integer
        seat_numbers:
          type: array
          items:
            type: string
        email:
          type: string
          format: email
        voucher_code:
          type: string
          nullable: true
        original_amount:
          type: string
          description: Decimal serialize thành chuỗi
          pattern: '^\d+(\.\d+)?$'
        discount_amount:
          type: string
          description: Decimal serialize thành chuỗi
          pattern: '^\d+(\.\d+)?$'
        final_amount:
          type: string
          description: Decimal serialize thành chuỗi
          pattern: '^\d+(\.\d+)?$'
        payment_id:
          type: integer
          nullable: true
        workflow_id:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, AWAITING_PAYMENT, ACTIVE, CANCELLED, FAILED]
        failure_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: "Error message"
