openapi: 3.0.3
info:
  title: Authentication Service API
  description: |
    Cấp JWT cho user trong hệ thống đặt vé xem phim.
    Hỗ trợ register, login, và verify JWT (được gateway sử dụng để xác thực request).
  version: 1.0.0

servers:
  - url: http://localhost:5001
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy

  /auth/register:
    post:
      summary: Tạo user mới và trả JWT
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Thiếu hoặc sai dữ liệu đầu vào
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email đã tồn tại
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Lỗi server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      summary: Xác thực user và trả JWT
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Sai email hoặc mật khẩu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Lỗi server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify:
    post:
      summary: Verify JWT và trả claims (dùng bởi gateway)
      operationId: verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Token hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "401":
          description: Token không hợp lệ hoặc đã hết hạn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "customer@example.com"
        password:
          type: string
          format: password
          example: "Str0ngP@ss"
        name:
          type: string
          example: "Nguyễn Văn A"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    VerifyRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."

    AuthResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        token:
          type: string
          description: JWT token

    VerifyResponse:
      type: object
      properties:
        valid:
          type: boolean
          example: true
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        exp:
          type: integer
          description: Unix timestamp hết hạn

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Error message"
