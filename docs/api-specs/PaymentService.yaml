openapi: 3.0.3
info:
  title: Payment Service API
  description: |
    Tạo VNPay payment URL, nhận kết quả thanh toán và expose trạng thái
    cho booking service polling. Đây là Data Owner của entity Payment.
  version: 1.0.0

servers:
  - url: http://localhost:5006
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /payments/create:
    post:
      summary: Tạo payment record + trả payment_url
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCreateRequest"
      responses:
        "201":
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentCreateResponse"
        "409":
          description: Đơn thanh toán đã tồn tại cho booking_id này
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error (thiếu/sai tham số)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/{payment_id}:
    get:
      summary: Xem payment theo id
      operationId: getPaymentById
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Không tìm thấy payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/by-booking/{booking_id}:
    get:
      summary: Xem payment theo booking_id
      operationId: getPaymentByBookingId
      parameters:
        - name: booking_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Không tìm thấy payment cho booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/{payment_id}/confirm:
    post:
      summary: Đánh dấu payment là SUCCESS / FAILED
      operationId: confirmPayment
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPaymentRequest"
      responses:
        "200":
          description: Đánh dấu thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Payment đã ở trạng thái terminal (SUCCESS / FAILED / CANCELLED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Không tìm thấy payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/{payment_id}/cancel:
    post:
      operationId: cancelPayment
      summary: Huỷ payment (idempotent)
      description: |
        Đánh dấu payment là CANCELLED. Dùng bởi BookingWorkflow compensation
        khi workflow fail / timeout. Idempotent: gọi lại với payment đã
        CANCELLED trả 200 no-op. Không được dùng cho payment đã SUCCESS.
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment đã ở trạng thái CANCELLED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentDetail"
        "404":
          description: Không tìm thấy đơn thanh toán
        "409":
          description: Không thể huỷ payment đã hoàn tất

  /payments/{payment_id}/checkout:
    get:
      summary: HTML trang cổng thanh toán VNPay
      operationId: paymentCheckoutPage
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: HTML trang thanh toán
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Không tìm thấy payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/vnpay-return:
    get:
      summary: VNPay return/IPN endpoint
      operationId: vnpayReturn
      parameters:
        - name: vnp_TxnRef
          in: query
          required: false
          schema:
            type: string
        - name: vnp_ResponseCode
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Trả redirect_url + status
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect_url:
                    type: string
                  status:
                    type: string

components:
  schemas:
    PaymentCreateRequest:
      type: object
      required:
        - booking_id
        - amount
      properties:
        booking_id:
          type: integer
          exclusiveMinimum: 0
        amount:
          description: >
            Decimal. Pydantic chấp nhận số (vd 150000) hoặc chuỗi (vd "150000.00").
          oneOf:
            - type: number
              exclusiveMinimum: 0
            - type: string
              pattern: '^\d+(\.\d+)?$'
        return_url:
          type: string
          nullable: true

    PaymentCreateResponse:
      type: object
      required:
        - payment_id
        - payment_url
        - status
      properties:
        payment_id:
          type: integer
        payment_url:
          type: string
          example: "http://localhost:5006/payments/12/checkout"
        status:
          type: string
          example: "PENDING"

    ConfirmPaymentRequest:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: "true → SUCCESS; false → FAILED"

    Payment:
      type: object
      properties:
        id:
          type: integer
        booking_id:
          type: integer
        amount:
          type: string
          description: Decimal serialize thành chuỗi (Pydantic v2 default), ví dụ "150000.00"
          pattern: '^\d+(\.\d+)?$'
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, CANCELLED]
        provider:
          type: string
          example: "vnpay"
        payment_url:
          type: string
          nullable: true
        provider_txn_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: "Error message"
